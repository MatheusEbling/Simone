<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bolas Interativas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a2e;
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            cursor: none;
        }
    </style>
</head>

<body>
    <canvas id="c"></canvas>
    <script>
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');

        const NUM = 28;
        let W, H, mouse = { x: -999, y: -999 };

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        const palette = [
            '#7F77DD', '#5DCAA5', '#D85A30', '#D4537E',
            '#378ADD', '#639922', '#EF9F27', '#E24B4A',
            '#534AB7', '#1D9E75', '#993C1D', '#993556',
        ];

        function randColor() {
            return palette[Math.floor(Math.random() * palette.length)];
        }

        const balls = Array.from({ length: NUM }, () => {
            const r = 16 + Math.random() * 24;
            return {
                x: r + Math.random() * (W - r * 2),
                y: r + Math.random() * (H - r * 2),
                vx: (Math.random() - 0.5) * 1.2,
                vy: (Math.random() - 0.5) * 1.2,
                r,
                color: randColor(),
                alpha: 0.82 + Math.random() * 0.18,
            };
        });

        canvas.addEventListener('mousemove', e => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        canvas.addEventListener('mouseleave', () => {
            mouse.x = -9999;
            mouse.y = -9999;
        });

        canvas.addEventListener('touchmove', e => {
            e.preventDefault();
            mouse.x = e.touches[0].clientX;
            mouse.y = e.touches[0].clientY;
        }, { passive: false });

        canvas.addEventListener('touchend', () => {
            mouse.x = -9999;
            mouse.y = -9999;
        });

        const REPEL = 110;      // raio de repulsão
        const FORCE = 5.5;      // força de repulsão
        const FRICTION = 0.965; // atrito (0-1, quanto menor mais lento)
        const SPEED_MAX = 9;    // velocidade máxima

        function loop() {
            ctx.clearRect(0, 0, W, H);

            for (const b of balls) {
                // calcula distância até o mouse
                const dx = b.x - mouse.x;
                const dy = b.y - mouse.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const zone = REPEL + b.r;

                // aplica repulsão se dentro da zona
                if (dist < zone && dist > 0.1) {
                    const power = (1 - dist / zone) * FORCE;
                    b.vx += (dx / dist) * power;
                    b.vy += (dy / dist) * power;
                }

                // atrito
                b.vx *= FRICTION;
                b.vy *= FRICTION;

                // limita velocidade máxima
                const spd = Math.sqrt(b.vx * b.vx + b.vy * b.vy);
                if (spd > SPEED_MAX) {
                    b.vx = (b.vx / spd) * SPEED_MAX;
                    b.vy = (b.vy / spd) * SPEED_MAX;
                }

                // move
                b.x += b.vx;
                b.y += b.vy;

                // colisão com bordas
                if (b.x - b.r < 0) { b.x = b.r; b.vx = Math.abs(b.vx) * 0.7; }
                if (b.x + b.r > W) { b.x = W - b.r; b.vx = -Math.abs(b.vx) * 0.7; }
                if (b.y - b.r < 0) { b.y = b.r; b.vy = Math.abs(b.vy) * 0.7; }
                if (b.y + b.r > H) { b.y = H - b.r; b.vy = -Math.abs(b.vy) * 0.7; }

                // desenha a bola
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
                ctx.globalAlpha = b.alpha;
                ctx.fillStyle = b.color;
                ctx.fill();

                // borda sutil
                ctx.globalAlpha = 0.18;
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2.5;
                ctx.stroke();
                ctx.globalAlpha = 1;

                // reflexo (brilho)
                ctx.beginPath();
                ctx.arc(b.x - b.r * 0.3, b.y - b.r * 0.32, b.r * 0.22, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255,255,255,0.28)';
                ctx.fill();
            }

            // desenha cursor personalizado
            if (mouse.x > 0 && mouse.x < W) {
                ctx.beginPath();
                ctx.arc(mouse.x, mouse.y, 7, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255,255,255,0.9)';
                ctx.fill();
                ctx.strokeStyle = 'rgba(0,0,0,0.25)';
                ctx.lineWidth = 1.5;
                ctx.stroke();
            }

            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>

</html>
